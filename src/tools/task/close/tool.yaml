name: task_close
description: >-
  Permanently close one idle delegated agent task while preserving its
  transcript and artifacts. Any queued follow-up messages are discarded. A
  running agent must be stopped first. Ordinary one-shot tool tasks cannot be
  closed.
returns: >-
  JSON `{task_id,kind,name,status,paused,pending_followups,last_output_seq}`.
input_schema:
  type: object
  properties:
    task_id:
      type: string
      description: Task id to close
  required: [task_id]
  additionalProperties: false
