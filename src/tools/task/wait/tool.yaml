name: task_wait
description: >-
  Wait for selected background tasks for one bounded interval. Omit task_ids to
  wait on every task. Waiting never stops unfinished work.
returns: >-
  JSON `{tasks:[{task_id,name,status}]}`. A task may still be queued or
  running when the bounded wait interval expires. Terminal content is not
  included here; it arrives separately as a terminal `<background_task>`
  runtime notice. Small text is inline; larger or binary output uses the
  ordinary bounded artifact envelope.
input_schema:
  type: object
  properties:
    task_ids:
      type: array
      items:
        type: string
      description: Task ids to wait for; omit to wait for all tasks
  additionalProperties: false
