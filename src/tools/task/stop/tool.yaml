name: task_stop
description: >-
  Stop one background task. A terminal one-shot task is returned unchanged.
  Stopping a delegated agent interrupts only its current activity and leaves
  the same child transcript idle and paused. The next task_send resumes it.
returns: >-
  JSON `{task_id,kind,name,status,paused,pending_followups,last_output_seq}` for the
  selected task.
input_schema:
  type: object
  properties:
    task_id:
      type: string
      description: Task id to stop
  required: [task_id]
  additionalProperties: false
