name: task_inspect
description: >-
  Read recent messages from a delegated reusable agent. Use next_before_seq as
  before_seq to continue backward when has_earlier is true. This operation is
  valid only for agent tasks, not promoted direct tools.
returns: >-
  JSON
  `{task_id,name,status,messages:[{seq,message}],has_earlier,next_before_seq}`.
input_schema:
  type: object
  properties:
    task_id:
      type: string
      description: Delegated agent task id
    before_seq:
      type: integer
      minimum: 1
      description: Return messages with seq lower than this value
    limit:
      type: integer
      minimum: 1
      maximum: 20
      default: 6
      description: Number of recent messages to return
  required: [task_id]
  additionalProperties: false
