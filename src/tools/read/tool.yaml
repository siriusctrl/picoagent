name: read
description: >-
  Read a UTF-8 local file or artifact by line range. offset is zero-based; limit
  and max_bytes bound the read. Use bash for directory listing or content
  discovery.
returns: >-
  The selected UTF-8 text. If unread content remains because limit or max_bytes
  was reached, an explicit truncation marker explains how to continue. A line
  limit marker includes the next zero-based offset.
input_schema:
  type: object
  properties:
    path:
      type: string
      description: Workspace-relative or absolute file path
    offset:
      type: integer
      minimum: 0
      default: 0
    limit:
      type: integer
      minimum: 1
      default: 200
    max_bytes:
      type: integer
      minimum: 1
      default: 65536
      description: Byte cap; use a small value such as 2048 when inspecting a spilled artifact
  required:
    - path
  additionalProperties: false
