name: read
description: >-
  Read a bounded UTF-8 range from a local file or artifact. Start at a
  zero-based line_offset for normal text, or use byte_offset for a long single
  line. The two offsets are mutually exclusive; the harness bounds lines and
  bytes internally. Use bash for directory listing or content discovery.
returns: >-
  The selected UTF-8 text. If unread content remains because the line or
  internal byte limit was reached, the truncation marker gives the exact
  line_offset or byte_offset for the next read.
input_schema:
  type: object
  properties:
    path:
      type: string
      description: Workspace-relative or absolute file path
    line_offset:
      type: integer
      minimum: 0
      default: 0
      description: Zero-based line to start at; do not combine with a nonzero byte_offset
    byte_offset:
      type: integer
      minimum: 0
      default: 0
      description: Zero-based byte to start at; use a continuation value returned by read
  required:
    - path
  additionalProperties: false
