name: inspect
description: >-
  Read recent durable messages from a delegated agent thread. Use
  next_before_seq as before_seq to continue backward when has_earlier is true.
  Asynchronous tool-job handles cannot be inspected.
returns: >-
  JSON
  `{handle,name,status,messages:[{seq,message}],has_earlier,next_before_seq}`.
input_schema:
  type: object
  properties:
    handle:
      type: string
      description: Delegated agent handle
    before_seq:
      type: integer
      minimum: 1
      description: Return messages with seq lower than this value
    limit:
      type: integer
      minimum: 1
      maximum: 20
      default: 6
      description: Number of recent messages to return
  required: [handle]
  additionalProperties: false
