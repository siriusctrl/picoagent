name: close
description: >-
  Permanently close one idle delegated agent thread while preserving its
  transcript and artifacts. A running agent must be stopped first.
  Asynchronous tool-job handles cannot be closed.
returns: >-
  JSON `{handle,kind,name,status}`.
input_schema:
  type: object
  properties:
    handle:
      type: string
      description: Agent handle to close
  required: [handle]
  additionalProperties: false
