name: send_message
description: >-
  Send a normal user message to a delegated agent thread. Use steer to affect
  its current activity at the next safe checkpoint; use followup to wait until
  the current activity finishes. Either mode starts an idle agent immediately.
  After a process restart this explicit call loads the thread's complete
  context and starts a new activity. Tool-job handles do not accept messages.
returns: >-
  JSON `{handle,name,status,message_id,requested_mode,accepted_as}`. The
  accepted_as value is `steered`, `queued_followup`, or `started`.
input_schema:
  type: object
  properties:
    handle:
      type: string
      description: Delegated agent handle
    message:
      type: string
      minLength: 1
      description: Normal user message to send to the agent
    mode:
      type: string
      enum: [steer, followup]
      description: Affect current activity or wait for it to finish
  required: [handle, message, mode]
  additionalProperties: false
