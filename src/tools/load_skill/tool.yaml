name: load_skill
description: >-
  Load the full instructions for one skill listed in the runtime skill catalog.
  Call this before following a relevant skill.
returns: >-
  `Skill directory: <path>`, then the SKILL.md instruction body; name and
  description metadata are not repeated. Resolve relative files named by the
  instructions from the returned directory.
input_schema:
  type: object
  properties:
    name:
      type: string
  required:
    - name
  additionalProperties: false
