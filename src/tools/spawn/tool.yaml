name: spawn
description: >-
  Start one allowed tool call or general-task subagent in the background and
  return immediately. For kind=tool, the schema's tool enum is the exact
  allowed set. Use this only for independent work; wait before consuming a
  dependency. Direct calls begin in the foreground and may enter the same task
  lifecycle after their foreground window. Completed results are appended at
  the next model boundary.
returns: >-
  JSON with task_id, kind, name, status, and a lifecycle message.
input_schema:
  type: object
  properties:
    kind:
      type: string
      enum: [tool, agent]
    tool:
      type: string
      description: Allowed tool name when kind=tool
    arguments:
      type: object
      description: Tool arguments when kind=tool
    prompt:
      type: string
      description: Complete delegated task when kind=agent
  required: [kind]
  additionalProperties: false
