name: history_search
description: >-
  Regex-search completed messages omitted from active context, including full
  text in linked foreground and background result artifacts. `pattern` uses
  Rust regex; use inline flags such as `(?i)`. Use this only when an active
  compacted state has omitted an exact fact needed for current work; it does
  not search messages still present in active context.
returns: >-
  One JSON object with `matches`, `truncated`, and `instruction`.
  `matches` is newest-first; each match has:

  - `ref`: `m<N>`, the stable 1-based message position in this run. Smaller
  `N` is older. Pass it unchanged to `history_read`.

  - `source`: `message` when the regex matched inline message content, or
  `artifact` when it matched the complete spilled tool result associated with
  that message. An artifact match may not appear in the bounded message
  preview returned by `history_read`.

  - `artifact`: the exact workspace-relative result path when `source` is
  `artifact`; absent for inline message matches. Read this path to inspect the
  matching complete result.

  - `snippet`: a bounded excerpt around the match.

  If `truncated` is true, only the configured number of newest matches is
  shown; refine the regex to inspect omitted older matches. `instruction` is
  otherwise null.
input_schema:
  type: object
  properties:
    pattern:
      type: string
      minLength: 1
      description: Rust regex
  required: [pattern]
  additionalProperties: false
