name: history_read
description: >-
  Read completed messages around a `ref` returned by `history_search`. `ref` is
  `m<N>`, where smaller `N` is older. `before` and `after` count nearby
  messages omitted from active context, not compaction cycles. This tool cannot
  modify history.
returns: >-
  Chronological JSONL with one object per message:
  `{"ref":"m<N>","message":<OpenAI Chat-compatible message>}`. Tool
  call/result pairs may expand together, so the result can contain more records
  than the requested window. Harness-only context-management records are
  excluded. For a search match with `source: "artifact"`, the matching text
  came from the full spilled result and may be outside the returned message's
  bounded preview; use the match's `artifact` path with `read`.
input_schema:
  type: object
  properties:
    ref:
      type: string
      minLength: 1
      pattern: "^m[1-9][0-9]*$"
      description: Stable m<N> ref from history_search; smaller N is older
    before:
      type: integer
      minimum: 0
      maximum: 10
      default: 2
      description: Nearby omitted messages before ref
    after:
      type: integer
      minimum: 0
      maximum: 10
      default: 2
      description: Nearby omitted messages after ref
  required: [ref]
  additionalProperties: false
