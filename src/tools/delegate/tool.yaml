name: delegate
description: >-
  Start an isolated reusable general-task agent for independent work. The
  prompt must contain the complete objective and task-specific context. It
  starts asynchronously; continue independent work or use task_wait before
  consuming an activity result. Later task_send calls reuse the same agent.
returns: >-
  A status-less `<background_task>` runtime notice with the task id and name.
  This only acknowledges background execution. A later result notice carries a
  sequence number and either small text inline or the ordinary bounded artifact
  envelope for larger or binary output. The agent becomes idle after that
  activity rather than closing.
input_schema:
  type: object
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 64
      description: Short stable label for recognizing this task later
    prompt:
      type: string
      description: >-
        Exact child objective and all task-specific context it needs. The child
        does not inherit the parent conversation
  required: [name, prompt]
  additionalProperties: false
