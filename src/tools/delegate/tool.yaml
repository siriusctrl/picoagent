name: delegate
description: >-
  Delegate independent work to an isolated general-task subagent. The prompt
  must contain the complete objective and task-specific context. The subagent
  always starts asynchronously; continue independent work or use task_wait
  before consuming its result.
returns: >-
  A status-less `<background_task>` runtime notice with the task id and name.
  This only acknowledges background execution. A later terminal notice carries
  a small textual result inline or the ordinary bounded artifact envelope for
  larger or binary output.
input_schema:
  type: object
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 64
      description: Short stable label for recognizing this task later
    prompt:
      type: string
      description: >-
        Exact child objective and all task-specific context it needs. The child
        does not inherit the parent conversation
  required: [name, prompt]
  additionalProperties: false
