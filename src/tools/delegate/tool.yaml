name: delegate
description: >-
  Delegate independent work to a general-task subagent. The subagent always
  starts asynchronously; continue independent work or use task_wait before
  consuming its result.
returns: >-
  A status-less `<background_task>` runtime notice with the task id and name.
  This only acknowledges background execution. A later terminal notice carries
  the complete result artifact path.
input_schema:
  type: object
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 64
      description: Short stable label for recognizing this task later
    prompt:
      type: string
      description: Complete task and all context the subagent needs
  required: [name, prompt]
  additionalProperties: false
