name: delegate
description: >-
  Start an isolated reusable general-task agent for independent work. The
  prompt must contain the complete objective and task-specific context. It
  starts asynchronously; continue independent work or use an available handle
  control before consuming its result. The returned agent thread can be reused
  for later messages.
returns: >-
  A status-less `<runtime_handle>` notice with the child run id and name. This
  only acknowledges asynchronous execution. A later result notice carries
  either small text inline or the ordinary bounded artifact envelope for larger
  or binary output. After that activity the agent becomes idle and reusable
  rather than closing.
input_schema:
  type: object
  properties:
    name:
      type: string
      minLength: 1
      description: Stable display label for recognizing this agent later
    prompt:
      type: string
      description: >-
        Exact child objective and all task-specific context it needs. The child
        does not inherit the parent conversation
  required: [name, prompt]
  additionalProperties: false
