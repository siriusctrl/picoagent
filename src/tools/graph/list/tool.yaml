name: graph_list
description: >-
  List and validate every durable planning graph in the current run. Use this
  to resume multi-turn work, check progress after accepting an outcome, derive
  newly ready work, or detect an invalid manual edit. Graphs are topology and
  accepted knowledge only; they do not mirror live execution state.

  A node is resolved only when `resolution.summary` records an accepted outcome
  or fact. Its optional evidence contains project-relative supporting paths.
  An unresolved node is ready when every dependency is resolved. Read a
  returned YAML path when the complete topology or current knowledge is needed,
  edit it with an available file capability, and validate again before relying
  on changed readiness.

  Validation checks the version and schema, canonical ids, dependencies,
  cycles, evidence paths, resolution ordering, and terminal state. `completed`
  requires every node resolved plus a top-level summary; `aborted` requires an
  abort reason. Only WIP graphs expose ready nodes. Dependent edits, validation,
  and execution belong in separate assistant turns because calls in one batch
  are concurrent.
returns: >-
  JSON arrays grouped as `wip`, `completed`, `aborted`, and `invalid`. Valid
  summaries contain id, project-relative path, goal, resolved and unresolved
  counts, and derived ready node ids. Terminal summaries always contain an empty
  `ready` array and include the completed summary or abort reason. Invalid
  entries retain their path and validation error so the YAML can be inspected
  and repaired.
input_schema:
  type: object
  properties: {}
  additionalProperties: false
