name: graph_init
description: |-
  Initialize and validate one complete planning topology for the current run.
  A graph records work items and accepted outcomes; it does not execute work or
  track runtime execution. Supply every initial node in this call. For example:

    {"goal":"Ship the API","nodes":{"inspect":{"objective":"Determine the API contract","depends_on":[]},"implement":{"objective":"Implement the accepted contract","depends_on":["inspect"]},"verify":{"objective":"Run the required tests","depends_on":["implement"]}}}

  Node ids are non-empty mapping keys without boundary whitespace. Dependencies
  must name nodes in this same call, may not repeat, and must form a DAG. The
  created version-1 YAML is `wip`, with every resolution set to null. Revise it
  later with `write`; use `graph_list` to validate and derive ready nodes,
  `delegate` to execute independent work, and runtime handle controls to
  supervise it.
  Because one assistant tool-call batch is concurrent, graph writes,
  validation, and dependent delegations belong in separate turns.
returns: >-
  JSON containing the short run-local graph `id`, project-relative YAML `path`,
  `wip` status, resolved/unresolved counts, and initially ready node ids. An
  invalid topology returns a tool error and creates no file.
input_schema:
  type: object
  properties:
    goal:
      type: string
      minLength: 1
      description: Concise overall outcome the graph should coordinate
    nodes:
      type: object
      minProperties: 1
      description: Complete initial node map keyed by stable node id
      additionalProperties:
        type: object
        properties:
          objective:
            type: string
            minLength: 1
          depends_on:
            type: array
            items:
              type: string
            uniqueItems: true
        required:
          - objective
          - depends_on
        additionalProperties: false
  required:
    - goal
    - nodes
  examples:
    - goal: Ship the API
      nodes:
        inspect:
          objective: Determine the API contract
          depends_on: []
        implement:
          objective: Implement the accepted contract
          depends_on:
            - inspect
  additionalProperties: false
