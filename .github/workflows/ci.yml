name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install bubblewrap (best-effort)
        run: |
          set -e
          sudo apt-get update -y
          sudo apt-get install -y bubblewrap || true
          command -v bwrap && bwrap --version || echo "[warn] bwrap not available; sandbox tests will be skipped"

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      - name: Typecheck
        run: bun run typecheck
